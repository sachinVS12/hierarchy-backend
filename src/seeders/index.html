<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manager Creation Form</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f2f4f7;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        width: 420px;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      h2 {
        text-align: center;
        color: #007bff;
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-top: 12px;
        font-weight: bold;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 15px;
      }

      button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        background: #007bff;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
      }

      button:hover {
        background: #0056b3;
      }

      #message {
        text-align: center;
        color: green;
        margin-top: 15px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Manager Creation Form</h2>

      <form id="managerForm">
        <label>Manager ID</label>
        <input type="text" id="managerId" required />

        <label>Full Name</label>
        <input type="text" id="fullName" required />

        <label>Email</label>
        <input type="email" id="email" required />

        <label>Phone Number</label>
        <input type="tel" id="phone" required />

        <label>Department</label>
        <select id="department" required>
          <option value="">Select Department</option>
          <option>Human Resources</option>
          <option>Finance</option>
          <option>Sales</option>
          <option>Marketing</option>
          <option>Information Technology</option>
          <option>Operations</option>
        </select>

        <label>Designation</label>
        <input type="text" id="designation" placeholder="Manager" required />

        <label>Joining Date</label>
        <input type="date" id="joiningDate" required />

        <label>Address</label>
        <textarea id="address" rows="3" required></textarea>

        <label>Password</label>
        <input type="password" id="password" required />

        <button type="submit">Create Manager</button>
      </form>

      <div id="message"></div>
    </div>

    <script>
      document
        .getElementById("managerForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          document.getElementById("message").innerHTML =
            "✅ Manager account created successfully!";

          this.reset();
        });
    </script>
  </body>
</html>
